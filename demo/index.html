<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<title>Notifications</title>
		<meta
			name="description"
			content="Notifications - to keep you informed about results, warnings and errors."
		/>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="stylesheet" href="../src/assets/css/design-system.css" />
		<link rel="stylesheet" href="../src/scss/notification.scss" />
		<link rel="stylesheet" href="style.css" />
		<style>
			body {
				background: linear-gradient(to bottom, #fcf5e9 20%, transparent 40%);
				color: var(--z-ds-color-text-100);
				min-height: 100vh;
				padding: var(--z-ds-space-m);
			}

			/* svg icons from zeit.web */
			.symbols {
				display: none;
			}

			.hero {
				text-align: center;
				padding: var(--z-ds-space-m);
			}

			.hero .mascot {
				height: 220px;
				width: auto;
				display: block;
				margin-left: auto;
				margin-right: auto;
			}

			.hero h1 {
				font-size: 3rem;
				color: var(--z-ds-color-text-100);
				font-weight: 600;
				letter-spacing: -0.01em;
				display: inline-block;
			}

			.hero p {
				font-size: var(--z-ds-fontsize-20);
				/* max-width: 600px; */
				margin: 0 auto;
				line-height: 1.2;
			}

			nav {
				padding: 0;
			}

			.demo {
				text-align: center;
				display: flex;
				flex-direction: column;
				gap: var(--z-ds-space-l);
				margin-top: var(--z-ds-space-m)
			}

			.demo h2 {
				font-size: var(--z-ds-fontsize-24);
				font-weight: 600;
				margin-bottom: var(--z-ds-space-xs);
			}

			.demo p {
				color: var(--z-ds-color-text-muted);
				margin-bottom: var(--z-ds-space-m);
			}

			.button-group {
				display: flex;
				flex-wrap: wrap;
				justify-content: center;
				gap: var(--z-ds-space-s);
			}

			.button {
				appearance: none;
				border: 1px solid transparent;
				border-radius: var(--z-ds-border-radius-4);
				background: var(--z-ds-color-text-100);
				color: var(--z-ds-color-background-0);
				cursor: pointer;
				font: inherit;
			}

			.button:hover {
				background-color: rgb(155, 6, 210);
			}

			.button:focus-visible {
				outline: 2px solid var(--z-ds-color-accent);
				outline-offset: 2px;
			}

			@media (max-width: 768px) {
				.hero h1 {
					font-size: 2rem;
				}
			}

			@media (prefers-color-scheme: dark) {
				body {
					background: var(--z-ds-color-background-10);
				}
				.button {
					background-color: var(--z-ds-color-general-white-40);
					color: var(--z-ds-color-text-100);
				}
				.button:hover {
					background-color: rgb(155, 6, 210);
					color: var(--z-ds-color-text-100);
				}
			}

		</style>
	</head>
	<body>
		<div class="symbols">
			<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
				<symbol viewBox="0 0 18 18" id="svg-bookmark" xmlns="http://www.w3.org/2000/svg">
					<title>Merkliste</title><path d="M8.665 13.33 3.75 15.786V2A.25.25 0 0 1 4 1.75h10a.25.25 0 0 1 .25.25v13.787l-4.915-2.458L9 13.161l-.335.168Z"/>
				</symbol>
				<symbol viewBox="0 0 18 18" id="svg-headphones" xmlns="http://www.w3.org/2000/svg">
					<title>Abspielen</title><path d="M9 1.25c2.612 0 4.579.882 5.885 2.35C16.178 5.052 16.75 6.996 16.75 9v4.5a3.25 3.25 0 0 1-3.25 3.25h-1.043c-.666 0-1.207-.54-1.207-1.207v-5.086c0-.666.54-1.207 1.207-1.207H13.5c.645 0 1.245.188 1.75.512V9c0-1.734-.495-3.29-1.485-4.403C12.787 3.498 11.255 2.75 9 2.75c-2.254 0-3.787.748-4.765 1.847C3.245 5.71 2.75 7.266 2.75 9v.762A3.234 3.234 0 0 1 4.5 9.25h1.043c.666 0 1.207.54 1.207 1.207v5.086c0 .666-.54 1.207-1.207 1.207H4.5a3.25 3.25 0 0 1-3.25-3.25V9c0-2.004.572-3.948 1.865-5.4C4.421 2.132 6.388 1.25 9 1.25Zm-4.5 9.5a1.75 1.75 0 0 0-1.75 1.75v1c0 .966.784 1.75 1.75 1.75h.75v-4.5H4.5Zm8.25 4.5h.75a1.75 1.75 0 0 0 1.75-1.75v-1a1.75 1.75 0 0 0-1.75-1.75h-.75v4.5Z"/>
				</symbol>
			</svg>
		</div>
		<main>
			<nav>
				<a href="index.html">home</a>
			</nav>
			<section class="hero">
				<img src="logo-meerkat.png" height="600" width="420" alt="notifications mascot" class="mascot" />
				<h1>Notifications</h1>
				<p>Notifications keep you informed about<br/>results, warnings and errors.</p>
			</section>

			<section class="demo" aria-label="Notification demos">
				<article>
					<h2>Bottom notifications</h2>
					<p>Trigger the different bottom variants and verify timing, stacking and actions.</p>
					<div class="button-group">
						<button type="button" class="button" data-action="success">Success</button>
						<button type="button" class="button" data-action="warning">Warning</button>
						<button type="button" class="button" data-action="error">Error with callBack</button>
						<button type="button" class="button" data-action="link">with Link</button>
					</div>
				</article>
				<article>
					<h2>Inline notifications</h2>
					<p>Use the anchor button to verify placement, dismissal on scroll and timeout handling.</p>
					<div class="button-group">
						<button type="button" class="button" data-action="inline">inline message</button>
					</div>
				</article>
			</section>
		</main>
		<script>
			// Initialize window.Zeit before any modules load
			window.Zeit = window.Zeit || {};
		</script>
		<script async type="module">
			import notification from "/index.js";

			function handleEvent(event) {
				const target = event.target;
				if (target.hasAttribute('data-action')) {
					const action = target.getAttribute('data-action');
					switch (action) {
						case 'success':
							notification.showBottom({
								status: 'success',
								message: 'Profile saved successfully.'
							});
							break;
						case 'warning':
							notification.showBottom({
								status: "warning",
								message: "Connection is unstable. Changes may sync later."
							});
							break;
						case 'error':
							notification.showBottom({
								status: "error",
								icon: "bookmark",
								message: "Publishing failed. Check the form and try again.",
								button: {
									text: "Retry",
									onClick: () => callBack('Retry triggered from the notification action.'),
								}
							});
							break;
						case 'link':
							notification.showBottom({
								status: "info",
								message: "A new version of Notification is available.",
								link: {
									text: "Open docs",
									href: "https://github.com/ZeitOnline/notification",
								}
							});
							break;
						case 'inline':
							notification.showInline({
								element: target,
								message: "This message is attached to the button you clicked.",
							});
							break;
						default:
							break;
					}
				}
			}

			document.addEventListener('click', handleEvent, true);

			function callBack(message){
				alert(message);
			}

		</script>
	</body>
</html>
