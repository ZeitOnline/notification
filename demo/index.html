		<section class="hero">

		<section class="demo" aria-label="Notification demos">
			<article>
				<p>Build your own notification by selecting options below.</p>
				<form id="notification-form" class="notification-form">
					<div class="form-row">
						<fieldset class="toggle-button-group" id="position-buttons" data-value="bottom">
							<legend class="form-label">Position</legend>
							<button type="button" class="toggle-button" data-value="inline">Inline</button>
							<button type="button" class="toggle-button" data-value="bottom">Bottom</button>
							<button type="button" class="toggle-button" data-value="top">Top</button>
							<button type="button" class="toggle-button" data-value="top-right">Top Right</button>
						</fieldset>
					</div>
					<div class="form-row">
						<fieldset class="toggle-button-group" id="group-buttons" data-value="">
							<legend class="form-label">Group</legend>
							<button type="button" class="toggle-button" data-value="groupA">foo</button>
							<button type="button" class="toggle-button" data-value="groupB">bar</button>
							<button type="button" class="toggle-button" data-value="groupC">foobar</button>
						</fieldset>
						<fieldset class="toggle-button-group" id="status-buttons" data-value="">
							<legend class="form-label">State</legend>
							<button type="button" class="toggle-button" data-value="info">Info</button>
							<button type="button" class="toggle-button" data-value="success">Success</button>
							<button type="button" class="toggle-button" data-value="error">Error</button>
						</fieldset>

					</div>
					<div class="form-row">
						<fieldset class="toggle-button-group" id="icon-buttons" data-value="">
							<legend class="form-label">Icon</legend>
							<button type="button" class="toggle-button" data-value="warning">Warning</button>
							<button type="button" class="toggle-button" data-value="information">Information</button>
						</fieldset>

						<fieldset class="toggle-button-group" id="timer-buttons">
							<legend class="form-label">Timer</legend>
							<button type="button" class="toggle-button" data-value="true">with Timer</button>
						</fieldset>
					</div>

					<div class="form-row">
						<fieldset class="toggle-button-group" id="interaction-buttons" data-value="none">
							<legend class="form-label">Interaction</legend>
							<button type="button" class="toggle-button" data-value="button">Button & Callback</button>
							<button type="button" class="toggle-button" data-value="link">Link</button>
						</fieldset>
					</div>

					<div class="form-message">
						<label class="form-label form-label--stacked" for="message-input">Message</label>
						<input type="text" id="message-input" name="message" class="input--underline"
							value="This is the default message" />
					</div>

					<button type="submit" class="button" id="show-notification-btn">Show Notification</button>
				</form>
			</article>
		</section>

	<script>
		// Initialize window.Zeit before any modules load
		window.Zeit = window.Zeit || {};
	</script>
	<script async type="module">
		import { initThemeSwitcher } from './theme-switcher.js';
		import notification from "/index.js";
		initThemeSwitcher();

		function callBack(message) {
			alert(message);
		}

		// Toggle Button Group Handler - Generic for all button groups
		document.querySelectorAll('.toggle-button-group').forEach(group => {
			group.addEventListener('click', (event) => {
				const clickedButton = event.target.closest('.toggle-button');
				if (!clickedButton) return;

				const isAlreadySelected = clickedButton.classList.contains('selected');

				// Deselect all buttons in the group
				group.querySelectorAll('.toggle-button').forEach(btn => {
					btn.classList.remove('selected');
					btn.setAttribute('aria-pressed', 'false');
				});

				// Toggle: if already selected, leave deselected; otherwise select
				if (isAlreadySelected) {
					group.dataset.value = '';
				} else {
					clickedButton.classList.add('selected');
					clickedButton.setAttribute('aria-pressed', 'true');
					group.dataset.value = clickedButton.dataset.value;
				}
			});
		});

		// Custom Notification Builder Form Handler
		const notificationForm = document.getElementById('notification-form');
		notificationForm.addEventListener('submit', (event) => {
			event.preventDefault();

			const group = document.getElementById('group-buttons').dataset.value || undefined;
			const position = document.getElementById('position-buttons').dataset.value;
			const status = document.getElementById('status-buttons').dataset.value || undefined;
			const icon = document.getElementById('icon-buttons').dataset.value || undefined;
			const interaction = document.getElementById('interaction-buttons').dataset.value;
			const hasTimer = document.getElementById('timer-buttons').dataset.value === 'true';
			const message = document.getElementById('message-input').value || 'Notification message';

			const options = {
				element: event.submitter,
				message,
				position,
				hasTimer,
			};

			if (group) options.group = group;
			if (status) options.status = status;
			if (icon) options.icon = icon;

			if (interaction === 'button') {
				options.button = {
					text: 'Action',
					onClick: () => callBack('Callback triggered from custom notification.'),
				};
			} else if (interaction === 'link') {
				options.link = {
					text: 'Learn more',
					href: 'https://github.com/ZeitOnline/notification',
				};
			}

			if (position === 'inline') {
				notification.showInline({
					element: event.submitter,
					message,
				});
			} else {
				notification.show(options);
			};

		});

	</script>
