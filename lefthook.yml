pre-commit:
  parallel: true
  commands:
    tests:
      run: npm test && npm run test:guidepup
    eslint:
      glob: "*.{js,ts}"
      root: src/
      run: npm --yes exec eslint -- {staged_files}
    prettier:
      glob: "*.{js,ts,css,scss}"
      root: src/
      run: npm --yes exec prettier -- --check {staged_files}
