name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: zon-ubuntu-general-dind
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created == 'true' }}

      - name: Setup Node.js for publishing
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          scope: "@zeitonline"

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: npm ci

      - name: Build package
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: npm run build

      - name: Debug OIDC context
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          test -n "${ACTIONS_ID_TOKEN_REQUEST_URL}"
          echo "OIDC token endpoint is available"
          echo "Runner: ${RUNNER_NAME} (${RUNNER_OS})"

      - name: Publish to npm
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: npm publish --provenance --access public

      - name: Upload release artifacts
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ steps.release.outputs.tag_name }} ./dist/notification.css ./dist/notification.js ./dist/notification.js.map
