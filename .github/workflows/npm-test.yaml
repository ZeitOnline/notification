name: npm test

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - 'main'
    paths:
      - '.github/workflows/npm-test.yaml'
      - 'package.json'
      - 'package-lock.json'
      - 'src/**'
  pull_request:
    paths:
      - '.github/workflows/npm-test.yaml'
      - 'package.json'
      - 'package-lock.json'
      - 'src/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test
